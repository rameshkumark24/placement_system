spring:
  application:
    name: placement-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placement_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}

jwt:
  secret: ${JWT_SECRET:placementSystemJwtSecretKey2026SecureKey123!}
  expiration-ms: ${JWT_EXPIRATION_MS:1800000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

rate-limit:
  capacity: ${RATE_LIMIT_CAPACITY:20}
  refill-tokens: ${RATE_LIMIT_REFILL_TOKENS:20}
  refill-duration-minutes: ${RATE_LIMIT_REFILL_DURATION_MINUTES:1}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1}
