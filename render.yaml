services:
  - type: web
    name: placement-system-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "1800000"
      - key: RATE_LIMIT_CAPACITY
        value: "20"
      - key: RATE_LIMIT_REFILL_TOKENS
        value: "20"
      - key: RATE_LIMIT_REFILL_DURATION_MINUTES
        value: "1"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
